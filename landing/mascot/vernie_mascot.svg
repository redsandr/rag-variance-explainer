<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6C8"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941F"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="14" ry="3" fill="#000" opacity="0.3"/>

  <!-- Legs -->
  <rect x="20" y="48" width="6" height="10" rx="2" fill="#2a2a3e"/>
  <rect x="38" y="48" width="6" height="10" rx="2" fill="#2a2a3e"/>

  <!-- Feet -->
  <rect x="18" y="56" width="10" height="5" rx="2" fill="#3a3a5e"/>
  <rect x="36" y="56" width="10" height="5" rx="2" fill="#3a3a5e"/>

  <!-- Body -->
  <rect x="14" y="28" width="36" height="24" rx="6" fill="#2a2a3e" stroke="#3a3a5e" stroke-width="1"/>

  <!-- Body detail lines -->
  <rect x="20" y="34" width="24" height="3" rx="1.5" fill="#1e1e2e"/>
  <rect x="20" y="40" width="18" height="3" rx="1.5" fill="#1e1e2e"/>

  <!-- Gold accent stripe on body -->
  <rect x="14" y="28" width="36" height="3" rx="1.5" fill="url(#gold)" opacity="0.9"/>

  <!-- Arms -->
  <rect x="6" y="32" width="10" height="6" rx="3" fill="#2a2a3e"/>
  <rect x="48" y="32" width="10" height="6" rx="3" fill="#2a2a3e"/>

  <!-- Handle -->
  <rect x="28" y="18" width="8" height="12" rx="2" fill="#3a3a5e" transform="rotate(-15, 32, 24)"/>

  <!-- Magnifying glass rim -->
  <circle cx="32" cy="12" r="14" fill="none" stroke="url(#gold)" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="32" cy="12" r="14" fill="none" stroke="#F5E6C8" stroke-width="0.5" opacity="0.4"/>

  <!-- Lens -->
  <circle cx="32" cy="12" r="11" fill="#4a90d9" opacity="0.12"/>
  <circle cx="32" cy="12" r="11" fill="url(#gold)" opacity="0.06"/>

  <!-- Lens highlight -->
  <ellipse cx="27" cy="7" rx="4" ry="2.5" fill="#fff" opacity="0.25" transform="rotate(-25, 27, 7)"/>

  <!-- Eyes -->
  <circle cx="28" cy="12" r="2.5" fill="#1a1a2e"/>
  <circle cx="36" cy="12" r="2.5" fill="#1a1a2e"/>
  <circle cx="29" cy="11" r="1" fill="#fff"/>
  <circle cx="37" cy="11" r="1" fill="#fff"/>

  <!-- Antenna -->
  <line x1="32" y1="-2" x2="32" y2="-10" stroke="#3a3a5e" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="32" cy="-12" r="2.5" fill="url(#gold)"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="12" r="18" fill="none" stroke="#D4AF37" stroke-width="0.3" opacity="0.2"/>
</svg>