<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="favGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="favGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6C8"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941F"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background so the glass reads at tiny sizes -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#0a0a0f"/>

  <!-- Antenna (shifted into frame) -->
  <line x1="32" y1="6" x2="32" y2="12" stroke="#3a3a5e" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="5" r="3" fill="url(#favGold)"/>

  <!-- Magnifying glass rim -->
  <circle cx="32" cy="34" r="19" fill="none" stroke="url(#favGold)" stroke-width="3.5" filter="url(#favGlow)"/>
  <circle cx="32" cy="34" r="19" fill="none" stroke="#F5E6C8" stroke-width="0.6" opacity="0.4"/>

  <!-- Lens -->
  <circle cx="32" cy="34" r="15" fill="#4a90d9" opacity="0.14"/>
  <circle cx="32" cy="34" r="15" fill="url(#favGold)" opacity="0.07"/>

  <!-- Lens highlight -->
  <ellipse cx="25" cy="27" rx="5.5" ry="3.5" fill="#fff" opacity="0.28" transform="rotate(-25, 25, 27)"/>

  <!-- Eyes -->
  <circle cx="27" cy="34" r="3.4" fill="#1a1a2e"/>
  <circle cx="37" cy="34" r="3.4" fill="#1a1a2e"/>
  <circle cx="28.2" cy="32.6" r="1.3" fill="#fff"/>
  <circle cx="38.2" cy="32.6" r="1.3" fill="#fff"/>

  <!-- Handle stub, bottom-right, hinting at the body -->
  <rect x="43" y="47" width="9" height="13" rx="3" fill="#3a3a5e" transform="rotate(35, 47.5, 53.5)"/>
</svg>
