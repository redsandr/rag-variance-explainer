<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#FFFFFF" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1F2937">Faithfulness Improvement Journey</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#6B7280">Strict faithfulness across 6 iterations of the RAG pipeline</text>
  
  <!-- Grid lines -->
  <line x1="90" y1="90" x2="90" y2="420" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="750" y1="90" x2="750" y2="420" stroke="#E5E7EB" stroke-width="1"/>
  
  <!-- Baseline (Iter 3) - 59.7% -->
  <text x="130" y="370" text-anchor="middle" font-size="11" fill="#6B7280">Baseline</text>
  <text x="130" y="383" text-anchor="middle" font-size="11" fill="#6B7280">(Iter 3)</text>
  <rect x="105" y="312" width="50" height="108" rx="4" fill="url(#bar1)" filter="url(#shadow)"/>
  <text x="130" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#EF4444">59.7%</text>
  
  <!-- Prompt fix (Iter 6) - 65.8% -->
  <text x="245" y="370" text-anchor="middle" font-size="11" fill="#6B7280">Prompt Fix</text>
  <text x="245" y="383" text-anchor="middle" font-size="11" fill="#6B7280">(Iter 6)</text>
  <rect x="220" y="293" width="50" height="127" rx="4" fill="url(#bar2)" filter="url(#shadow)"/>
  <text x="245" y="286" text-anchor="middle" font-size="13" font-weight="700" fill="#D97706">65.8%</text>

  <!-- Phase 1 fixes (Iter 9) - 69.6% -->
  <text x="360" y="370" text-anchor="middle" font-size="11" fill="#6B7280">Phase 1</text>
  <text x="360" y="383" text-anchor="middle" font-size="11" fill="#6B7280">(Iter 9)</text>
  <rect x="335" y="278" width="50" height="142" rx="4" fill="url(#bar3)" filter="url(#shadow)"/>
  <text x="360" y="271" text-anchor="middle" font-size="13" font-weight="700" fill="#16A34A">69.6%</text>

  <!-- Model Swap (Iter 9.5) - 74.24% -->
  <text x="475" y="370" text-anchor="middle" font-size="11" fill="#6B7280">Model Swap</text>
  <text x="475" y="383" text-anchor="middle" font-size="11" fill="#6B7280">(Iter 9.5)</text>
  <rect x="450" y="258" width="50" height="162" rx="4" fill="url(#bar4)" filter="url(#shadow)"/>
  <text x="475" y="251" text-anchor="middle" font-size="13" font-weight="700" fill="#2563EB">74.2%</text>

  <!-- Cross-Sector - 59.29% -->
  <text x="590" y="370" text-anchor="middle" font-size="11" fill="#6B7280">Cross-Sector</text>
  <text x="590" y="383" text-anchor="middle" font-size="11" fill="#6B7280">(7 cos)</text>
  <rect x="565" y="312" width="50" height="108" rx="4" fill="url(#bar5)" filter="url(#shadow)"/>
  <text x="590" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#7C3AED">59.3%</text>

  <!-- Callout arrows -->
  <!-- +6.1pp -->
  <path d="M155 297 L210 297" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="182" y="292" text-anchor="middle" font-size="10" fill="#9CA3AF">+6.1pp</text>
  
  <!-- +3.8pp -->
  <path d="M270 285 L325 285" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="298" y="280" text-anchor="middle" font-size="10" fill="#9CA3AF">+3.8pp</text>

  <!-- +4.6pp -->
  <path d="M385 270 L440 270" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="413" y="265" text-anchor="middle" font-size="10" fill="#9CA3AF">+4.6pp</text>

  <!-- Y-axis labels -->
  <text x="82" y="420" text-anchor="end" font-size="10" fill="#9CA3AF">0%</text>
  <text x="82" y="210" text-anchor="end" font-size="10" fill="#9CA3AF">50%</text>
  <text x="82" y="90" text-anchor="end" font-size="10" fill="#9CA3AF">100%</text>

  <!-- Delta label -->
  <text x="475" y="440" text-anchor="middle" font-size="12" font-weight="600" fill="#22C55E">Total: 59.7% → 74.2%</text>
  <text x="475" y="456" text-anchor="middle" font-size="11" fill="#6B7280">+14.5pp from baseline (restaurant-only, 20 Q)</text>
  
  <!-- Note -->
  <text x="475" y="490" text-anchor="middle" font-size="10" fill="#9CA3AF">Cross-sector eval (40 Q, 7 companies) yields 59.3% strict / 73.5% weighted — harder eval, 7B model ceiling</text>
</svg>